<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MNAU SSD AR-Scanner</title>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <link rel="apple-touch-icon" href="assets/img/logo.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/img/logo.png">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    MNAU HUD wird geladen...
</div>

<div id="database-view">
    <div class="database-header">
        <div class="header-main-row">
            <h1>SSD Database</h1>
            <button class="feature-toggle-btn" onclick="toggleFeatureHub()" title="Zusatzfeatures öffnen">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                Features
            </button>
        </div>

        <div class="header-controls-row">
            <div class="search-group">
                <input type="text" id="db-search" class="search-input" placeholder="SSD oder Ordner suchen..." oninput="renderManagerList()">
                <button id="search-clear-btn" class="search-clear-btn" onclick="clearSearch()" title="Suche leeren">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
                </button>
            </div>

            <input type="hidden" id="db-sort" value="name">

            <div class="sort-dropdown-container">
                <button class="sort-icon-btn" onclick="toggleSortMenu(event)" title="Sortieren">
                    <svg viewBox="0 0 24 24"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
                </button>
                <div id="sort-dropdown-menu" class="sort-dropdown-menu">
                    <div class="sort-option active" data-sort-val="name" onclick="setSortMode('name', event)">Alphabetisch</div>
                    <div class="sort-option" data-sort-val="storage" onclick="setSortMode('storage', event)">Freier Speicher</div>
                </div>
            </div>

            <button id="db-refresh-btn" class="sort-icon-btn" onclick="manualRefresh()" title="Database aktualisieren">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </div>
    </div>

    <div id="feature-hub-panel" class="feature-hub-panel">
        <div class="feature-card">
            <div class="feature-card-title">💾 Datenverteilungs-Planer (Drehtag)</div>
            <div class="allocation-controls">
                <input type="number" id="db-alloc-val" class="search-input alloc-input" placeholder="Menge" oninput="renderManagerList()">
                <select id="db-alloc-unit" class="sort-select alloc-unit" onchange="renderManagerList()">
                    <option value="TB">TB</option>
                    <option value="GB">GB</option>
                </select>
            </div>
        </div>
    </div>

    <div id="manager-content" class="manager-content"></div>
</div>

<div class="fab-camera-trigger" onclick="openScanner()" title="QR-Scanner starten">
    <svg viewBox="0 0 24 24">
        <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
    </svg>
</div>

<div id="scanner-overlay">
    <button class="close-scanner-btn" onclick="closeScanner()" title="Scanner schließen">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
    </button>
    <video id="video" playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div class="scan-container">
        <div class="scan-region"></div>
        <div id="ar-card" class="ar-card">
            <h2 id="ssd-name">-</h2>
            <div id="ssd-speicher" class="speicher-info">-</div>

            <div class="storage-bar-container" style="margin-top: 10px; margin-bottom: 14px;">
                <div id="ar-storage-bar" class="storage-bar" style="width: 0%;"></div>
            </div>

            <div class="folder-title">Hauptordner:</div>
            <div id="ssd-ordner" class="folder-list">-</div>
            <div id="ssd-update" class="update-time">-</div>
        </div>
    </div>
</div>

<script type="module" src="assets/js/app.js"></script>
</body>
</html>
