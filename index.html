<!DOCTYPE html><html lang="de"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MNAU SSD AR-Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="apple-touch-icon" sizes="152x152" href="logo.png">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #video {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        .scan-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }
        .scan-region {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 240px; height: 240px;
            border: 2px dashed rgba(0, 255, 204, 0.5);
            border-radius: 24px;
            box-sizing: border-box;
        }
        .scan-region::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: #00ffcc; box-shadow: 0 0 12px #00ffcc;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        .ar-card {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); width: 92%; max-width: 420px;
            background: rgba(10, 17, 28, 0.94);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border-radius: 16px; padding: 20px; color: white;
            box-sizing: border-box; transition: all 0.3s ease;
            display: none; pointer-events: auto;
        }
        .ar-card h2 {
            margin: 0 0 4px 0; color: #00ffcc; font-size: 1.4rem;
            letter-spacing: 0.5px;
        }
        .speicher-info {
            font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 12px;
        }
        .folder-title {
            font-size: 0.8rem; text-transform: uppercase; color: #718096;
            margin-bottom: 6px; letter-spacing: 1px;
        }
        .folder-list {
            background: rgba(255, 255, 255, 0.06); border-radius: 8px;
            padding: 12px; max-height: 140px; overflow-y: auto;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            font-size: 0.85rem; white-space: pre-wrap; line-height: 1.4;
            border-left: 3px solid #00ffcc;
        }
        .update-time {
            font-size: 0.72rem; color: #a0aec0; text-align: right; margin-top: 10px;
        }
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a111c; z-index: 10; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            color: #00ffcc; font-size: 1.2rem;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(0,255,204,0.1);
            border-top-color: #00ffcc; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Floating Action Button (FAB) */
        .fab {
            position: absolute; bottom: 30px; right: 30px; z-index: 5;
            width: 60px; height: 60px; background: #0a111c;
            border: 2px solid #00ffcc; border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto; transition: all 0.2s ease;
        }
        .fab:active { transform: scale(0.9); }
        .fab svg { width: 26px; height: 26px; fill: #00ffcc; }

        /* Fullscreen Manager Overlay */
        .manager-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 17, 28, 0.98); z-index: 6;
            display: none; flex-direction: column; color: white;
            box-sizing: border-box; pointer-events: auto;
        }
        .manager-header {
            padding: 24px 20px; border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .manager-header h1 { margin: 0; font-size: 1.5rem; color: #00ffcc; }
        .close-btn {
            background: none; border: 1px solid #00ffcc; color: #00ffcc;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .manager-content {
            flex: 1; overflow-y: auto; padding: 20px;
        }
        .ssd-row {
            background: rgba(255, 255, 255, 0.05); border-radius: 12px;
            padding: 16px; margin-bottom: 14px; border-left: 4px solid #00ffcc;
            display: flex; flex-direction: column; align-items: stretch;
        }
        .ssd-row-header {
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
        }
        .ssd-info-block { flex: 1; min-width: 0; }
        .ssd-row-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ssd-row-meta { font-size: 0.9rem; color: #a0aec0; }
        
        /* Action Group & Dropdown Menu */
        .action-group {
            display: flex; align-items: center; gap: 8px;
        }
        .logo-select {
            background: #0a111c; color: #00ffcc; border: 1px solid #00ffcc;
            padding: 9px 8px; border-radius: 8px; font-weight: bold; outline: none;
            cursor: pointer; font-size: 0.85rem;
        }
        .print-btn {
            background: #00ffcc; border: none; color: #0a111c;
            padding: 10px 14px; border-radius: 8px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: background 0.2s; font-size: 0.85rem;
        }
        .print-btn:disabled { background: #4a5568; color: #a0aec0; }

        /* Ordner-Akkordeon */
        .ssd-details {
            margin-top: 12px; padding-top: 10px;
            border-top: 1px solid rgba(0, 255, 204, 0.1);
        }
        .ssd-details summary {
            color: #00ffcc; font-size: 0.85rem; cursor: pointer;
            outline: none; user-select: none; list-style: none;
            display: flex; align-items: center; gap: 6px;
        }
        .ssd-details summary::-webkit-details-marker { display: none; }
        .ssd-details summary::before {
            content: '▶'; display: inline-block; font-size: 0.7rem;
            transition: transform 0.2s ease; color: #00ffcc;
        }
        .ssd-details[open] summary::before { transform: rotate(90deg); }
        .ssd-folders-preview {
            background: rgba(255, 255, 255, 0.03); border-radius: 8px;
            padding: 10px; margin-top: 8px; max-height: 160px; overflow-y: auto;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            font-size: 0.8rem; white-space: pre-wrap; line-height: 1.4;
            border-left: 2px solid #00ffcc; color: #e2e8f0;
        }
    </style></head><body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        MNAU HUD wird geladen...
    </div>

    <video id="video" playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="scan-container">
        <div class="scan-region"></div>
        
        <div id="ar-card" class="ar-card">
            <h2 id="ssd-name">-</h2>
            <div id="ssd-speicher" class="speicher-info">-</div>
            <div class="folder-title">Hauptordner:</div>
            <div id="ssd-ordner" class="folder-list">-</div>
            <div id="ssd-update" class="update-time">-</div>
        </div>
    </div>

    <div class="fab" onclick="openManager()">
        <svg viewBox="0 0 24 24">
            <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
        </svg>
    </div>

    <div id="manager-overlay" class="manager-overlay">
        <div class="manager-header">
            <h1>MNAU HUD Database</h1>
            <button class="close-btn" onclick="closeManager()">Schließen</button>
        </div>
        <div id="manager-content" class="manager-content"></div>
    </div>

    <script>
        // ----------------------------------------------------
        // HIER DEINE AIRTABLE DATEN EINTRAGEN!
        const airtableToken = "HIER_DEINEN_PERSONAL_ACCESS_TOKEN_EINFÜGEN";
        const baseId = "HIER_DEINE_BASE_ID_EINFÜGEN";
        const tableName = "SSDs";
        // ----------------------------------------------------

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let lastUUID = "";
        let isFetching = false;
        let clearTimer = null;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                document.getElementById('loading-overlay').style.display = 'none';
                requestAnimationFrame(tick);
            })
            .catch(function(err) {
                document.getElementById('loading-overlay').innerText = "Kamerazugriff verweigert oder nicht unterstützt.";
                console.error(err);
            });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code && code.data) {
                    const scannedUUID = code.data.trim();
                    if (scannedUUID.length > 5) {
                        handleQRDetected(scannedUUID);
                        if (scannedUUID === lastUUID) {
                            resetClearTimer();
                        }
                    }
                }
            }
            requestAnimationFrame(tick);
        }

        async function handleQRDetected(uuid) {
            if (uuid === lastUUID || isFetching) return;
            if (clearTimer) clearTimeout(clearTimer);
            isFetching = true;
            lastUUID = uuid;

            const card = document.getElementById('ar-card');
            const nameEl = document.getElementById('ssd-name');
            const speicherEl = document.getElementById('ssd-speicher');
            const ordnerEl = document.getElementById('ssd-ordner');
            const updateEl = document.getElementById('ssd-update');

            card.style.display = 'block';
            card.style.borderColor = '#00ffcc';
            nameEl.innerText = "Verbinde mit Airtable...";
            speicherEl.innerText = "UUID erkannt: " + uuid.substring(0,8) + "...";
            ordnerEl.innerText = "Lade Ordnerstruktur...";
            updateEl.innerText = "-";

            try {
                const response = await fetch(`https://api.airtable.com/v0/${baseId}/${tableName}?filterByFormula={UUID}='${uuid}'`, {
                    headers: { Authorization: `Bearer ${airtableToken}` }
                });
                const data = await response.json();

                if (data.records && data.records.length > 0) {
                    const fields = data.records[0].fields;
                    nameEl.innerText = fields.Name || "Unbenannte SSD";
                    speicherEl.innerText = fields.Speicher || "Keine Speicherinfo";
                    ordnerEl.innerText = fields.Ordner || "(Leer)";
                    updateEl.innerText = "Zuletzt aktualisiert: " + (fields.Updates || "-");
                    card.style.borderColor = '#00ff00';
                    setTimeout(() => { card.style.borderColor = '#00ffcc'; }, 600);
                } else {
                    nameEl.innerText = "Unbekannte SSD";
                    speicherEl.innerText = "Gescannte ID: " + uuid;
                    ordnerEl.innerText = "Prüfe, ob diese ID exakt so in der Airtable-Spalte 'UUID' steht.";
                    card.style.borderColor = '#ff3333';
                }
            } catch (error) {
                nameEl.innerText = "Verbindungsfehler";
                speicherEl.innerText = "Airtable-Server nicht erreichbar.";
                console.error(error);
            } finally {
                isFetching = false;
                resetClearTimer();
            }
        }

        function resetClearTimer() {
            if (clearTimer) clearTimeout(clearTimer);
            clearTimer = setTimeout(() => {
                document.getElementById('ar-card').style.display = 'none';
                lastUUID = "";
            }, 6000); 
        }

        /* Manager Logik für Datenbank-Übersicht */
        async function openManager() {
            const overlay = document.getElementById('manager-overlay');
            const content = document.getElementById('manager-content');
            overlay.style.display = 'flex';
            content.innerHTML = '<div style="color:#00ffcc; text-align:center; padding:20px;">Lade Airtable-Datenbank...</div>';

            try {
                const response = await fetch(`https://api.airtable.com/v0/${baseId}/${tableName}`, {
                    headers: { Authorization: `Bearer ${airtableToken}` }
                });
                const data = await response.json();
                content.innerHTML = '';

                if (data.records && data.records.length > 0) {
                    data.records.forEach(record => {
                        const f = record.fields;
                        if (!f.UUID || !f.Name) return;

                        const cleanFolders = f.Ordner ? f.Ordner.split('\\n').filter(Boolean).join('\n') : '(Keine Ordner vorhanden)';

                        const row = document.createElement('div');
                        row.className = 'ssd-row';
                        row.innerHTML = `
                            <div class="ssd-row-header">
                                <div class="ssd-info-block">
                                    <div class="ssd-row-title">${f.Name}</div>
                                    <div class="ssd-row-meta">Speicher: ${f.Speicher || 'Keine Info'}</div>
                                </div>
                                <div class="action-group">
                                    <select id="logo-select-${f.UUID}" class="logo-select">
                                        <option value="mnau_logo.svg">MNAU</option>
                                        <option value="gecko_logo.svg">Gecko</option>
                                    </select>
                                    <button class="print-btn" onclick="generateLabelPNG('${f.Name}', '${f.UUID}')">
                                        <svg style="width:16px; height:16px; fill:currentColor;" viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                                        PNG
                                    </button>
                                </div>
                            </div>
                            <details class="ssd-details">
                                <summary>Ordnerstruktur einblenden</summary>
                                <div class="ssd-folders-preview">${cleanFolders}</div>
                            </details>
                        `;
                        content.appendChild(row);
                    });
                } else {
                    content.innerHTML = '<div style="text-align:center; color:#a0aec0;">Keine SSDs in Airtable gefunden.</div>';
                }
            } catch (error) {
                content.innerHTML = '<div style="text-align:center; color:#ff3333;">Fehler beim Laden von Airtable.</div>';
                console.error(error);
            }
        }

        function closeManager() {
            document.getElementById('manager-overlay').style.display = 'none';
        }

        /* NEU: HTML5 Off-Screen Canvas Label Generator (Ausgabe: PNG) */
        async function generateLabelPNG(name, uuid) {
            try {
                // Den ausgewählten Logo-Pfad für diese spezifische Zeile holen
                const selectedLogoFile = document.getElementById(`logo-select-${uuid}`).value;

                // QR-Code generieren (300px für gestochen scharfe Qualität)
                const qrDataUrl = await QRCode.toDataURL(uuid, { margin: 1, width: 300 });

                // Virtueller Canvas mit exakter 15:50 Proportional-Auflösung (300px x 1000px)
                const labelCanvas = document.createElement('canvas');
                labelCanvas.width = 300;
                labelCanvas.height = 1000;
                const lCtx = labelCanvas.getContext('2d');

                // 1. Reiner weißer Etiketten-Hintergrund
                lCtx.fillStyle = '#ffffff';
                lCtx.fillRect(0, 0, 300, 1000);

                // 2. Ausgewähltes SVG-Logo laden und zeichnen (MNAU oder Gecko)
                const logoImg = new Image();
                logoImg.src = selectedLogoFile;
                await new Promise((resolve, reject) => {
                    logoImg.onload = resolve;
                    logoImg.onerror = () => reject(new Error(`Logo ${selectedLogoFile} konnte nicht geladen werden.`));
                });
                // Entspricht exakt 13mm Breite zentriert im oberen Bereich (Y: 40px bis 300px)
                lCtx.drawImage(logoImg, 20, 40, 260, 260);

                // 3. SSD-Name als Text platzieren
                lCtx.fillStyle = '#000000';
                lCtx.font = 'bold 26px -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif';
                lCtx.textAlign = 'center';
                lCtx.fillText(name, 150, 365);

                // 4. QR-Code laden und im unteren Bereich aufzeichnen (Y: 420px bis 680px)
                const qrImg = new Image();
                qrImg.src = qrDataUrl;
                await new Promise((resolve) => qrImg.onload = resolve);
                lCtx.drawImage(qrImg, 20, 420, 260, 260);

                // HINWEIS: UUID-Klartext wurde wie gewünscht weggelassen!

                // 5. Automatischen PNG-Bild-Download triggern
                const downloadLink = document.createElement('a');
                downloadLink.download = `Label_${name.replace(/\s+/g, '_')}.png`;
                downloadLink.href = labelCanvas.toDataURL('image/png');
                downloadLink.click();

            } catch (err) {
                alert("Fehler beim Erstellen des PNG-Labels. Vergewissere dich, dass mnau_logo.svg und gecko_logo.svg im Stammordner auf GitHub liegen.");
                console.error(err);
            }
        }
    </script></body></html>
